<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="経費管理">
<meta name="theme-color" content="#1E3A5F">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>経費管理</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;background:#F0F4F8;min-height:100vh;min-height:-webkit-fill-available;overscroll-behavior:none}
input,select,textarea,button{font-family:inherit}
.screen{display:none;min-height:100vh;padding-bottom:80px}
.screen.active{display:block}
.header{background:linear-gradient(135deg,#1E3A5F,#2A5298);padding:env(safe-area-inset-top,12px) 16px 14px;position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:10px}
.header h1{font-size:17px;font-weight:600;color:#fff;flex:1}
.back-btn{background:none;border:none;cursor:pointer;color:#fff;font-size:22px;padding:0;line-height:1;width:32px}
.header-sub{font-size:11px;color:#93C5FD;text-align:right}
.sync-bar{background:#2A5298;color:#fff;font-size:12px;text-align:center;padding:5px;display:none}
.fab{position:fixed;bottom:calc(24px + env(safe-area-inset-bottom,0px));right:20px;width:56px;height:56px;border-radius:50%;background:#2A5298;border:none;cursor:pointer;font-size:26px;color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(42,82,152,0.45);z-index:20}
.fab:active{transform:scale(0.93)}
.year-tabs{display:flex;gap:0;overflow-x:auto;background:#fff;border-bottom:1px solid #E2E8F0;padding:0 16px}
.year-tab{padding:12px 16px;border:none;background:none;cursor:pointer;font-size:14px;color:#718096;font-weight:500;white-space:nowrap;border-bottom:3px solid transparent}
.year-tab.active{color:#2A5298;border-bottom-color:#2A5298}
.summary-total{margin:14px 16px 0;background:#fff;border-radius:14px;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;border:0.5px solid #E2E8F0}
.summary-total .lbl{font-size:13px;color:#718096}
.summary-total .val{font-size:26px;font-weight:700;color:#1E3A5F}
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:12px 16px}
.summary-card{background:#fff;border-radius:12px;padding:12px 14px;border-left:4px solid;border-top:0.5px solid #E2E8F0;border-right:0.5px solid #E2E8F0;border-bottom:0.5px solid #E2E8F0}
.summary-card .lbl{font-size:11px;color:#718096;margin-bottom:4px}
.summary-card .val{font-size:17px;font-weight:700;color:#1A202C}
.list-header{padding:12px 16px 6px;font-size:12px;color:#A0AEC0;font-weight:600;letter-spacing:0.5px}
.csv-btn{display:block;margin:0 16px 8px;padding:11px;background:#fff;border:0.5px solid #CBD5E0;border-radius:12px;font-size:13px;color:#4A5568;cursor:pointer;text-align:center;width:calc(100% - 32px)}
.reload-btn{display:block;margin:0 16px 8px;padding:11px;background:#EBF4FF;border:0.5px solid #BEE3F8;border-radius:12px;font-size:13px;color:#2A5298;cursor:pointer;text-align:center;width:calc(100% - 32px)}
.empty{padding:48px 16px;text-align:center;color:#A0AEC0;font-size:14px;line-height:1.8}
.expense-item{background:#fff;margin:0 16px 8px;border-radius:12px;padding:12px 14px;cursor:pointer;border:0.5px solid #E2E8F0}
.expense-item:active{background:#F0F4F8}
.ei-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
.ei-desc{font-size:14px;font-weight:600;color:#1A202C;flex:1;margin-right:8px}
.ei-amount{font-size:15px;font-weight:700;color:#1E3A5F;white-space:nowrap}
.ei-bottom{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.ei-date{font-size:12px;color:#718096}
.cat-badge{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600}
.cat-info{background:#DBEAFE;color:#1D4ED8}
.cat-analysis{background:#DCFCE7;color:#15803D}
.cat-comm{background:#FEF3C7;color:#B45309}
.cat-other{background:#F3F4F6;color:#374151}
.ei-memo{font-size:12px;color:#A0AEC0;margin-top:4px;width:100%}
.add-body{padding:16px}
.upload-area{border:2px dashed #CBD5E0;border-radius:14px;padding:24px 16px;text-align:center;cursor:pointer;margin-bottom:16px;background:#FAFBFC}
.upload-area input{display:none}
.upload-area .icon{font-size:32px;margin-bottom:8px}
.upload-area p{font-size:14px;color:#718096}
.upload-area .sub{font-size:12px;color:#A0AEC0;margin-top:4px}
.file-badges{display:flex;gap:8px;justify-content:center;margin-top:10px}
.fbadge{font-size:11px;padding:3px 10px;border-radius:20px;background:#EDF2F7;color:#4A5568;border:0.5px solid #CBD5E0}
.preview-img{width:100%;max-height:200px;object-fit:cover;border-radius:12px;margin-bottom:14px;display:none}
.pdf-preview{background:#F7FAFC;border:0.5px solid #E2E8F0;border-radius:12px;padding:14px;margin-bottom:14px;display:none;align-items:center;gap:12px}
.ocr-status{padding:10px 12px;border-radius:10px;font-size:13px;margin-bottom:14px;display:none}
.ocr-loading{background:#DBEAFE;color:#1D4ED8}
.ocr-done{background:#DCFCE7;color:#15803D}
.ocr-error{background:#FEE2E2;color:#B91C1C}
.form-group{margin-bottom:14px}
.form-label{font-size:12px;color:#4A5568;margin-bottom:6px;display:block;font-weight:600}
.form-input{width:100%;padding:12px 14px;border:1px solid #E2E8F0;border-radius:10px;font-size:15px;color:#1A202C;background:#fff;-webkit-appearance:none}
.form-input:focus{outline:none;border-color:#2A5298}
.cat-selector{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.cat-btn{padding:10px 8px;border:1px solid #E2E8F0;border-radius:10px;font-size:13px;cursor:pointer;text-align:center;background:#fff;color:#4A5568}
.cat-btn.sel-info{border:2px solid #1D4ED8;background:#DBEAFE;color:#1D4ED8;font-weight:600}
.cat-btn.sel-analysis{border:2px solid #15803D;background:#DCFCE7;color:#15803D;font-weight:600}
.cat-btn.sel-comm{border:2px solid #B45309;background:#FEF3C7;color:#B45309;font-weight:600}
.cat-btn.sel-other{border:2px solid #374151;background:#F3F4F6;color:#374151;font-weight:600}
.save-btn{width:100%;padding:15px;background:#2A5298;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;margin-top:8px}
.save-btn:active{background:#1E3A5F}
.detail-body{padding:16px}
.detail-card{background:#fff;border-radius:14px;overflow:hidden;margin-bottom:12px;border:0.5px solid #E2E8F0}
.detail-img{width:100%;max-height:200px;object-fit:cover;display:none}
.detail-pdf-row{background:#F7FAFC;padding:12px 14px;display:none;align-items:center;gap:10px;border-bottom:0.5px solid #E2E8F0}
.detail-row{display:flex;justify-content:space-between;align-items:center;padding:13px 16px;border-bottom:0.5px solid #F0F4F8}
.detail-row:last-child{border-bottom:none}
.dr-label{font-size:13px;color:#718096}
.dr-value{font-size:14px;color:#1A202C;text-align:right;max-width:65%;font-weight:500}
.del-btn{width:100%;padding:14px;background:#fff;color:#DC2626;border:1px solid #FCA5A5;border-radius:12px;font-size:15px;cursor:pointer}
</style>
</head>
<body>

<div id="screen-home" class="screen active">
  <div class="header">
    <h1>📊 経費管理</h1>
    <div class="header-sub">確定申告用</div>
  </div>
  <div id="sync-bar" class="sync-bar">🔄 スプレッドシートと同期中...</div>
  <div class="year-tabs" id="year-tabs"></div>
  <div class="summary-total">
    <span class="lbl">経費合計</span>
    <span class="val" id="grand-total">¥0</span>
  </div>
  <div class="summary-grid" id="summary-grid"></div>
  <button class="reload-btn" onclick="reloadData()">🔄 最新データを読み込む</button>
  <button class="csv-btn" onclick="exportCSV()">📥 CSV出力（確定申告用）</button>
  <div class="list-header">明細一覧</div>
  <div id="expense-list"></div>
  <button class="fab" onclick="showScreen('add')">＋</button>
</div>

<div id="screen-add" class="screen">
  <div class="header">
    <button class="back-btn" onclick="showScreen('home')">←</button>
    <h1>経費を追加</h1>
  </div>
  <div class="add-body">
    <div class="upload-area" id="upload-area" onclick="document.getElementById('file-input').click()">
      <input type="file" id="file-input" accept="image/*,application/pdf" onchange="handleFile(event)">
      <div class="icon">📎</div>
      <p>レシート・領収書を選択</p>
      <div class="sub">カメラで撮影またはファイルから選択</div>
      <div class="file-badges">
        <span class="fbadge">写真（JPG/PNG）</span>
        <span class="fbadge">PDF</span>
      </div>
    </div>
    <img id="preview-img" class="preview-img">
    <div id="pdf-preview" class="pdf-preview">
      <span style="font-size:30px">📄</span>
      <div><div id="pdf-name" style="font-size:13px;color:#1A202C;word-break:break-all"></div><div id="pdf-size" style="font-size:11px;color:#A0AEC0;margin-top:2px"></div></div>
    </div>
    <div id="ocr-status" class="ocr-status"></div>
    <div class="form-group">
      <label class="form-label">日付</label>
      <input type="date" class="form-input" id="f-date">
    </div>
    <div class="form-group">
      <label class="form-label">金額（円）</label>
      <input type="number" class="form-input" id="f-amount" placeholder="例：3800" inputmode="numeric">
    </div>
    <div class="form-group">
      <label class="form-label">支払先</label>
      <input type="text" class="form-input" id="f-payee" placeholder="例：Amazon、NTT">
    </div>
    <div class="form-group">
      <label class="form-label">区分</label>
      <div class="cat-selector">
        <button class="cat-btn" data-cat="info" onclick="selectCat(this)">情報収集費用</button>
        <button class="cat-btn" data-cat="analysis" onclick="selectCat(this)">情報分析費用</button>
        <button class="cat-btn" data-cat="comm" onclick="selectCat(this)">通信費</button>
        <button class="cat-btn" data-cat="other" onclick="selectCat(this)">その他</button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">備考（任意）</label>
      <textarea class="form-input" id="f-memo" rows="3" placeholder="自由記述"></textarea>
    </div>
    <button class="save-btn" onclick="saveExpense()">保存する</button>
  </div>
</div>

<div id="screen-detail" class="screen">
  <div class="header">
    <button class="back-btn" onclick="showScreen('home')">←</button>
    <h1>明細</h1>
  </div>
  <div class="detail-body">
    <div class="detail-card">
      <img id="detail-img" class="detail-img">
      <div id="detail-pdf-row" class="detail-pdf-row">
        <span style="font-size:24px">📄</span>
        <span style="font-size:13px;color:#718096">PDFファイル添付済み</span>
      </div>
      <div id="detail-rows"></div>
    </div>
    <button class="del-btn" onclick="deleteExpense()">この経費を削除</button>
  </div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyGBgXw6Hev35sghi4XYmdaf6lXTzCMqtUDlHJnxG0DVWuAB4SPOqetV0aQUnE-A2Q/exec';
const CATS = {
  info:     {label:'情報収集費用', badge:'cat-info',     sel:'sel-info',     color:'#3B82F6'},
  analysis: {label:'情報分析費用', badge:'cat-analysis', sel:'sel-analysis', color:'#22C55E'},
  comm:     {label:'通信費',       badge:'cat-comm',     sel:'sel-comm',     color:'#F59E0B'},
  other:    {label:'その他',       badge:'cat-other',    sel:'sel-other',    color:'#9CA3AF'},
};

let expenses = [];
try { expenses = JSON.parse(localStorage.getItem('keihi_expenses') || '[]'); } catch(e){}
let selectedCat = null;
let currentFileData = null;
let currentFileType = null;
let detailId = null;
let activeYear = new Date().getFullYear();

function fmt(n) { return '¥' + Number(n).toLocaleString('ja-JP'); }

function setSyncBar(visible) {
  document.getElementById('sync-bar').style.display = visible ? 'block' : 'none';
}

async function loadFromSheets() {
  setSyncBar(true);
  try {
    const res = await fetch(GAS_URL + '?t=' + Date.now());
    const data = await res.json();
    if (Array.isArray(data)) {
      expenses = data.map(e => ({...e, amount: Number(e.amount)}));
      try { localStorage.setItem('keihi_expenses', JSON.stringify(expenses)); } catch(e){}
    }
  } catch(e) {
    try { expenses = JSON.parse(localStorage.getItem('keihi_expenses') || '[]'); } catch(e2){}
  }
  setSyncBar(false);
  renderHome();
}

async function reloadData() {
  await loadFromSheets();
}

async function saveToSheets(expense) {
  try {
    await fetch(GAS_URL, {
      method: 'POST',
      body: JSON.stringify({...expense, action:'save', year: expense.date.slice(0,4)}),
    });
  } catch(e) {}
}

async function deleteFromSheets(id, date) {
  try {
    await fetch(GAS_URL, {
      method: 'POST',
      body: JSON.stringify({action:'delete', id, year: date.slice(0,4)}),
    });
  } catch(e) {}
}

function getYears() {
  const years = [...new Set(expenses.map(e => String(e.date).slice(0,4)))].sort().reverse();
  if (!years.length) years.push(String(new Date().getFullYear()));
  return years;
}

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  window.scrollTo(0,0);
  if (name === 'home') renderHome();
  if (name === 'add') resetForm();
}

function renderHome() {
  const years = getYears();
  if (!years.includes(String(activeYear))) activeYear = parseInt(years[0]);
  document.getElementById('year-tabs').innerHTML = years.map(y =>
    `<button class="year-tab${parseInt(y)===activeYear?' active':''}" onclick="setYear(${y})">${y}年</button>`
  ).join('');
  const yearExp = expenses.filter(e => String(e.date).startsWith(String(activeYear)));
  const totals = {info:0,analysis:0,comm:0,other:0};
  yearExp.forEach(e => { totals[e.cat] = (totals[e.cat]||0) + Number(e.amount); });
  const grand = Object.values(totals).reduce((a,b)=>a+b,0);
  document.getElementById('grand-total').textContent = fmt(grand);
  document.getElementById('summary-grid').innerHTML = Object.entries(CATS).map(([k,v]) =>
    `<div class="summary-card" style="border-left-color:${v.color}">
      <div class="lbl">${v.label}</div>
      <div class="val">${fmt(totals[k])}</div>
    </div>`
  ).join('');
  const list = document.getElementById('expense-list');
  if (!yearExp.length) {
    list.innerHTML = '<div class="empty">📋<br>経費がまだありません<br>右下の ＋ から追加できます</div>';
    return;
  }
  list.innerHTML = [...yearExp].sort((a,b)=>String(b.date).localeCompare(String(a.date))).map(e => {
    const c = CATS[e.cat] || CATS.other;
    return `<div class="expense-item" onclick="showDetail('${e.id}')">
      <div class="ei-top">
        <span class="ei-desc">${e.payee}</span>
        <span class="ei-amount">${fmt(e.amount)}</span>
      </div>
      <div class="ei-bottom">
        <span class="ei-date">${e.date}</span>
        <span class="cat-badge ${c.badge}">${c.label}</span>
      </div>
      ${e.memo ? `<div class="ei-memo">${e.memo}</div>` : ''}
    </div>`;
  }).join('');
}

function setYear(y) { activeYear = y; renderHome(); }

function showDetail(id) {
  detailId = id;
  const e = expenses.find(x => x.id === id);
  if (!e) return;
  const c = CATS[e.cat] || CATS.other;
  document.getElementById('detail-img').style.display = 'none';
  document.getElementById('detail-pdf-row').style.display = 'none';
  document.getElementById('detail-rows').innerHTML = [
    ['日付', e.date],
    ['金額', fmt(e.amount)],
    ['支払先', e.payee],
    ['区分', `<span class="cat-badge ${c.badge}">${c.label}</span>`],
    ['備考', e.memo || '—'],
  ].map(([l,v]) =>
    `<div class="detail-row"><span class="dr-label">${l}</span><span class="dr-value">${v}</span></div>`
  ).join('');
  showScreen('detail');
}

async function deleteExpense() {
  if (!confirm('この経費を削除しますか？')) return;
  const e = expenses.find(x => x.id === detailId);
  expenses = expenses.filter(x => x.id !== detailId);
  try { localStorage.setItem('keihi_expenses', JSON.stringify(expenses)); } catch(err){}
  if (e) await deleteFromSheets(detailId, e.date);
  showScreen('home');
}

function resetForm() {
  document.getElementById('f-date').value = new Date().toISOString().slice(0,10);
  document.getElementById('f-amount').value = '';
  document.getElementById('f-payee').value = '';
  document.getElementById('f-memo').value = '';
  document.getElementById('preview-img').style.display = 'none';
  document.getElementById('pdf-preview').style.display = 'none';
  document.getElementById('upload-area').style.display = 'block';
  document.getElementById('ocr-status').style.display = 'none';
  document.querySelectorAll('.cat-btn').forEach(b => b.className = 'cat-btn');
  selectedCat = null; currentFileData = null; currentFileType = null;
  document.getElementById('file-input').value = '';
}

function selectCat(btn) {
  document.querySelectorAll('.cat-btn').forEach(b => b.className = 'cat-btn');
  selectedCat = btn.dataset.cat;
  btn.className = 'cat-btn ' + CATS[selectedCat].sel;
}

function handleFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const isPDF = file.type === 'application/pdf';
  const reader = new FileReader();
  reader.onload = async (ev) => {
    currentFileData = ev.target.result;
    currentFileType = isPDF ? 'pdf' : 'image';
    document.getElementById('upload-area').style.display = 'none';
    if (isPDF) {
      document.getElementById('pdf-name').textContent = file.name;
      document.getElementById('pdf-size').textContent = (file.size/1024).toFixed(0) + ' KB';
      document.getElementById('pdf-preview').style.display = 'flex';
    } else {
      const img = document.getElementById('preview-img');
      img.src = currentFileData; img.style.display = 'block';
    }
    await runOCR(currentFileData, isPDF);
  };
  reader.readAsDataURL(file);
}

async function runOCR(fileData, isPDF) {
  const status = document.getElementById('ocr-status');
  status.className = 'ocr-status ocr-loading';
  status.textContent = isPDF ? 'AIがPDFを読み取っています…' : 'AIがレシートを読み取っています…';
  status.style.display = 'block';
  const apiKey = localStorage.getItem('anthropic_api_key');
  if (!apiKey) {
    const key = prompt('AnthropicのAPIキーを入力してください（sk-ant-...）:');
    if (!key) { status.className='ocr-status ocr-error'; status.textContent='APIキーが未設定です'; return; }
    localStorage.setItem('anthropic_api_key', key);
  }
  const base64 = fileData.split(',')[1];
  const mediaType = isPDF ? 'application/pdf' : fileData.split(';')[0].split(':')[1];
  const contentBlock = isPDF
    ? {type:'document', source:{type:'base64', media_type:'application/pdf', data:base64}}
    : {type:'image', source:{type:'base64', media_type:mediaType, data:base64}};
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':localStorage.getItem('anthropic_api_key'),'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:300,
        messages:[{role:'user',content:[contentBlock,{type:'text',text:'この領収書・レシート・PDFから以下をJSON形式のみで返してください。余計な文章は不要です。\n{"date":"YYYY-MM-DD","amount":数値,"payee":"支払先名"}\n日付不明は今日の日付、金額不明は0、支払先不明は空文字にしてください。'}]}]
      })
    });
    const data = await res.json();
    const text = (data.content?.[0]?.text || '').replace(/```json|```/g,'').trim();
    const parsed = JSON.parse(text);
    if (parsed.date) document.getElementById('f-date').value = parsed.date;
    if (parsed.amount) document.getElementById('f-amount').value = parsed.amount;
    if (parsed.payee) document.getElementById('f-payee').value = parsed.payee;
    status.className = 'ocr-status ocr-done';
    status.textContent = '✓ 読み取り完了！内容を確認してください';
  } catch(err) {
    status.className = 'ocr-status ocr-error';
    status.textContent = '読み取りに失敗しました。手動で入力してください';
  }
}

async function saveExpense() {
  const date = document.getElementById('f-date').value;
  const amount = document.getElementById('f-amount').value;
  const payee = document.getElementById('f-payee').value;
  const memo = document.getElementById('f-memo').value;
  if (!date || !amount || !payee || !selectedCat) { alert('日付・金額・支払先・区分は必須です'); return; }
  const expense = {id: Date.now().toString(), date, amount:Number(amount), payee, cat:selectedCat, memo};
  expenses.push(expense);
  try { localStorage.setItem('keihi_expenses', JSON.stringify(expenses)); } catch(e){}
  showScreen('home');
  await saveToSheets(expense);
}

function exportCSV() {
  const yearExp = expenses.filter(e => String(e.date).startsWith(String(activeYear)));
  if (!yearExp.length) { alert('経費データがありません'); return; }
  const header = '日付,区分,支払先,金額,備考\n';
  const rows = yearExp.sort((a,b)=>String(a.date).localeCompare(String(b.date)))
    .map(e => `${e.date},${CATS[e.cat]?.label||e.cat},"${e.payee}",${e.amount},"${e.memo||''}"`)
    .join('\n');
  const blob = new Blob(['\uFEFF'+header+rows], {type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `経費_${activeYear}.csv`;
  a.click();
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

loadFromSheets();
</script>
